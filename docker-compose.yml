services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farmse
      POSTGRES_PASSWORD: farmse123
      POSTGRES_DB: farmse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U farmse" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://farmse:farmse123@postgres:5432/farmse
      ALLOWED_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In Docker, the frontend calls /api/* which nginx proxies to backend.
        # Leave VITE_API_URL empty so the frontend uses relative URLs.
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
